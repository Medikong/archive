InputInvalid:
  description: 요청 형식 또는 파라미터가 유효하지 않다.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: interest.input_invalid
          message: 요청 파라미터가 유효하지 않습니다.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'

AuthenticationRequired:
  description: Authorization bearer token is missing, malformed, or invalid.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: auth.missing_token
          message: 로그인이 필요합니다.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'

RequestForbidden:
  description: Operator role is required.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: auth.forbidden
          message: 이 작업을 수행할 권한이 없습니다.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'

ResourceNotFound:
  description: 대상 드롭 또는 리소스를 찾을 수 없다.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: interest.resource_not_found
          message: 대상을 찾을 수 없습니다.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'

Conflict:
  description: 동시 수정 충돌 또는 상태 전이 규칙 위반이다.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: interest.conflict
          message: 다른 요청과 충돌했습니다. 최신 상태를 다시 확인하세요.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'

ServiceUnavailable:
  description: 필수 의존성 장애로 요청을 처리할 수 없다.
  headers:
    Retry-After:
      $ref: ./headers.yaml#/RetryAfter
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        error:
          code: interest.service_unavailable
          message: 잠시 후 다시 시도하세요.
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        occurredAt: '2026-07-13T09:00:00Z'
