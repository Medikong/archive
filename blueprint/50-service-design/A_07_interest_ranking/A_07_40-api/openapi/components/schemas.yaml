HealthResponse:
  type: object
  required: [status, service]
  properties:
    status:
      type: string
      enum: [ok]
    service:
      type: string
      examples: [interest-service]
    timestamp:
      type: string
      format: date-time

ReadinessResponse:
  type: object
  required: [status, service, checks]
  properties:
    status:
      type: string
      enum: [ready, not_ready]
    service:
      type: string
      examples: [interest-service]
    checks:
      type: object
      additionalProperties:
        type: string
    timestamp:
      type: string
      format: date-time

PageInfo:
  type: object
  required: [hasNext]
  properties:
    nextCursor:
      type: [string, "null"]
    hasNext:
      type: boolean

ErrorResponse:
  type: object
  required: [error, requestId, occurredAt]
  properties:
    error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 업무 오류 코드(내부 원인이 아니라 공개 가능한 조건).
          examples: [interest.drop_not_found]
        message:
          type: string
    requestId:
      type: string
      format: uuid
    occurredAt:
      type: string
      format: date-time

InterestStatus:
  type: string
  enum: [active, inactive]

# 2026-07-14: 현재 어떤 스키마도 참조하지 않는다 — DropInterestCounter가 drop_phase 추적을 그만뒀다
# (catalog-service 의존 제거). 오픈 후 랭킹(API.A.07-05) 착수 시 다시 쓰일 목표 설계로 남겨둔다.
DropPhase:
  type: string
  enum: [SCHEDULED, OPEN, CLOSED]

UserRole:
  type: string
  enum: [CUSTOMER, OPERATOR, ADMIN]
  description: '`service` 레포 `contracts/common/components.yaml`의 UserRole과 동일하다.'

Interest:
  type: object
  required: [dropId, status, updatedAt]
  properties:
    dropId:
      type: string
      format: uuid
    status:
      $ref: '#/InterestStatus'
    updatedAt:
      type: string
      format: date-time

# 단일 리소스 응답은 data로 감싼다(catalog-service의 DropDetailResponse, order-service의 OrderResponse와 동일한 패턴).
InterestResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/Interest'

InterestListItem:
  type: object
  required: [dropId, addedAt]
  properties:
    dropId:
      type: string
      format: uuid
    addedAt:
      type: string
      format: date-time

# 목록 응답은 catalog-service의 DropListResponse와 동일하게 data + pageInfo 구조를 쓴다(제네릭 data/meta 래퍼가 아니라 커서 페이지네이션 전용 구조다).
InterestListResponse:
  type: object
  required: [data, pageInfo]
  properties:
    data:
      type: array
      items:
        $ref: '#/InterestListItem'
    pageInfo:
      $ref: '#/PageInfo'

# 2026-07-14: ViewRecordResult/ViewRecordResponse 제거 — 조회 기록 API가 204 No Content로 바뀌면서
# (dedup이 쓰기 시점이 아니라 랭킹 집계 시점으로 이동, api-endpoint-process.md API.A.07-04 참고)
# 응답 본문 자체가 필요 없어졌다.

OpenRankingItem:
  type: object
  required: [dropId, sellThroughScore]
  properties:
    dropId:
      type: string
      format: uuid
    sellThroughScore:
      type: number
      format: float

OpenRankingListResponse:
  type: object
  required: [data, pageInfo]
  properties:
    data:
      type: array
      items:
        $ref: '#/OpenRankingItem'
    pageInfo:
      $ref: '#/PageInfo'

# 2026-07-14: upcomingCount -> interestCount로 개명(의미가 "당일 누적"에서 "리셋 없는 누적"으로 바뀜).
UpcomingRankingItem:
  type: object
  required: [dropId, interestCount]
  properties:
    dropId:
      type: string
      format: uuid
    interestCount:
      type: integer
      minimum: 0

UpcomingRankingListResponse:
  type: object
  required: [data, pageInfo]
  properties:
    data:
      type: array
      items:
        $ref: '#/UpcomingRankingItem'
    pageInfo:
      $ref: '#/PageInfo'

# 2026-07-14 신규: 실시간 많이 보는 상품 랭킹(API.A.07-08).
TrendingRankingItem:
  type: object
  required: [dropId, rank, viewerCount]
  properties:
    dropId:
      type: string
      format: uuid
    rank:
      type: integer
      minimum: 1
      maximum: 100
    viewerCount:
      type: integer
      minimum: 0
      description: 가장 최근 KST 3시간 구간의 서로 다른 조회자 수다.

TrendingRankingListResponse:
  type: object
  required: [data, pageInfo, bucketStart]
  properties:
    data:
      type: array
      items:
        $ref: '#/TrendingRankingItem'
    pageInfo:
      $ref: '#/PageInfo'
    bucketStart:
      type: string
      format: date-time
      description: 이 스냅샷이 집계한 KST 3시간 구간의 시작 시각이다.

# 2026-07-14: dropPhase/viewCountTotal/sellThroughScore 제거 — 오픈 후 랭킹·조회수 통계가
# 후속 스코프라 지금은 누적 찜 수만 노출한다(api-endpoint-process.md API.A.07-07 확인 필요 참고).
DropInterestStats:
  type: object
  required: [dropId, interestCount]
  properties:
    dropId:
      type: string
      format: uuid
    interestCount:
      type: integer
      minimum: 0

DropInterestStatsResponse:
  type: object
  required: [data]
  properties:
    data:
      $ref: '#/DropInterestStats'
