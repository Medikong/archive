post:
  tags:
    - Interest
  summary: 드롭 조회 기록
  description: |
    드롭 상세 화면 진입을 관심 신호로 기록한다(2026-07-14 재설계). 반복 조회를 막지 않고 매번 원문 그대로
    `drop_views`에 기록한다. 같은 사용자의 반복 조회는 랭킹 집계 시점(`COUNT(DISTINCT user_id)`)에서
    자연히 1명으로 처리되므로, 이 API 자체는 dedup을 하지 않는다(멱등하지 않음, 매번 새 행 추가).
  operationId: recordDropView
  x-api-id: API.A.07-04
  x-use-case: UC.A.07
  x-service-design: SD.A.0740
  x-design-doc: ../../api-endpoint-process.md
  security:
    - BearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XUserId
    - $ref: ../components/parameters.yaml#/XUserRole
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/DropIdPath
  responses:
    '204':
      description: 조회 기록을 저장했다(본문 없음).
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '404':
      $ref: ../components/responses.yaml#/ResourceNotFound
