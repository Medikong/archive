    - Interest
  summary: 찜 추가
  description: 로그인 사용자를 특정 드롭에 찜한 상태로 만든다. 이미 찜한 상태면 변경 없이 성공을 반환한다(멱등).
  operationId: addInterest
  x-api-id: API.A.07-01
  x-use-case: UC.A.07
  x-service-design: SD.A.0740
  x-design-doc: ../../api-endpoint-process.md
  security:
    - BearerAuth: []
  parameters:
