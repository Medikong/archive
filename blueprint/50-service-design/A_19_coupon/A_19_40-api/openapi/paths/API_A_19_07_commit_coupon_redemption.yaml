post:
  tags: [CouponRedemption]
  summary: 쿠폰 사용 확정
  description: 결제 최종 확정 사건 참조를 검증해 예약을 사용 완료로 전환하고 비용 귀속을 기록한다. 주문 생성이나 중간 결제 승인만으로는 확정하지 않는다.
  operationId: commitCouponRedemption
  x-api-id: API.A.19-07
  x-use-case: UC.A.19-24
  x-command: CMD.A.19-11
  x-service-design: SD.A.1940
  x-design-doc: ../../API_A_19_07_commit_coupon_redemption.md
  security:
    - WorkloadBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/RedemptionId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema: {$ref: ../components/schemas.yaml#/RedemptionTransitionRequest}
  responses:
    '200':
      description: 예약된 쿠폰 사용을 확정했다.
      headers:
        X-Request-Id: {$ref: ../components/headers.yaml#/XRequestId}
        Cache-Control: {$ref: ../components/headers.yaml#/CacheControlNoStore}
      content:
        application/json:
          schema: {$ref: ../components/schemas.yaml#/RedemptionResponse}
    '400': {$ref: ../components/responses.yaml#/BadRequest}
    '401': {$ref: ../components/responses.yaml#/AuthenticationRequired}
    '403': {$ref: ../components/responses.yaml#/Forbidden}
    '404': {$ref: ../components/responses.yaml#/NotFound}
    '409': {$ref: ../components/responses.yaml#/Conflict}
    '503': {$ref: ../components/responses.yaml#/Unavailable}
