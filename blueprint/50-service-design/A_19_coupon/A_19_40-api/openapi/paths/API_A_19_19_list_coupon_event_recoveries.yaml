get:
  tags: [CouponOperations]
  summary: 쿠폰 이벤트 복구 목록 조회
  description: 사용 이벤트 처리 실패와 재처리 상태를 Postgres 복구 원장에서 조회한다.
  operationId: listCouponEventRecoveries
  x-api-id: API.A.19-19
  x-use-case: UC.A.19-16
  x-read-models: [RM.A.19-05]
  x-service-design: SD.A.1940
  x-design-doc: ../../API_A_19_19_list_coupon_event_recoveries.md
  security:
    - WorkloadBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - name: status
      in: query
      required: false
      schema: {$ref: ../components/schemas.yaml#/RecoveryStatus}
    - name: originalOperationType
      in: query
      required: false
      schema:
        type: string
        enum: [reserve, commit, release, revoke]
    - $ref: ../components/parameters.yaml#/Cursor
    - $ref: ../components/parameters.yaml#/Limit
  responses:
    '200':
      description: 권한 범위의 복구 항목을 반환한다.
      headers:
        X-Request-Id: {$ref: ../components/headers.yaml#/XRequestId}
        Cache-Control: {$ref: ../components/headers.yaml#/CacheControlNoStore}
      content:
        application/json:
          schema: {$ref: ../components/schemas.yaml#/RecoveryListResponse}
    '400': {$ref: ../components/responses.yaml#/BadRequest}
    '401': {$ref: ../components/responses.yaml#/AuthenticationRequired}
    '403': {$ref: ../components/responses.yaml#/Forbidden}
    '503': {$ref: ../components/responses.yaml#/Unavailable}
