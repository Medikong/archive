post:
  tags: [CouponOperations]
  summary: 쿠폰 이벤트 복구 재시도
  description: 승인된 복구 작업으로 새 attempt를 만들고 원본 사용 Command 재실행을 접수한다.
  operationId: retryCouponEventRecovery
  x-api-id: API.A.19-20
  x-use-case: UC.A.19-17
  x-command: CMD.A.19-21
  x-service-design: SD.A.1940
  x-design-doc: ../../API_A_19_20_retry_coupon_event_recovery.md
  security:
    - WorkloadBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/RecoveryId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
    - $ref: ../components/parameters.yaml#/XApprovalRef
  requestBody:
    required: true
    content:
      application/json:
        schema: {$ref: ../components/schemas.yaml#/RetryRecoveryRequest}
  responses:
    '202':
      description: 새 복구 attempt를 retry_pending으로 등록했다.
      headers:
        X-Request-Id: {$ref: ../components/headers.yaml#/XRequestId}
        Cache-Control: {$ref: ../components/headers.yaml#/CacheControlNoStore}
        Location: {$ref: ../components/headers.yaml#/Location}
        Retry-After: {$ref: ../components/headers.yaml#/RetryAfter}
      content:
        application/json:
          schema: {$ref: ../components/schemas.yaml#/RecoveryAttemptAcceptedResponse}
    '400': {$ref: ../components/responses.yaml#/BadRequest}
    '401': {$ref: ../components/responses.yaml#/AuthenticationRequired}
    '403': {$ref: ../components/responses.yaml#/Forbidden}
    '404': {$ref: ../components/responses.yaml#/NotFound}
    '409': {$ref: ../components/responses.yaml#/Conflict}
    '422': {$ref: ../components/responses.yaml#/BusinessRejected}
    '503': {$ref: ../components/responses.yaml#/Unavailable}
