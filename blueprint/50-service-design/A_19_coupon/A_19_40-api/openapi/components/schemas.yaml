      $ref: '#/AttemptId'
    status:
      type: string
      enum: [retry_pending]
    statusPath:
      type: string
      format: uri-reference

RecoveryAttemptAcceptedResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/RecoveryAttemptAcceptedData'
    meta:
      $ref: '#/ResponseMeta'

FinalizeRecoveryRequest:
  type: object
  required: [reasonCode, operationTaskRef]
  additionalProperties: false
  properties:
    reasonCode:
      type: string
      minLength: 1
      maxLength: 80
    operationTaskRef:
      $ref: '#/ExternalRef'

RecoveryResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/RecoveryItem'
    meta:
      $ref: '#/ResponseMeta'

TimelineEvent:
  type: object
  required: [eventId, eventType, occurredAt, resultRef]
  additionalProperties: false
  properties:
    eventId:
      type: string
      maxLength: 128
    eventType:
      type: string
      pattern: '^EVT\.A\.19-[0-9]{2}$'
    occurredAt:
      type: string
      format: date-time
    campaignId:
      $ref: '#/CampaignId'
    userCouponId:
      $ref: '#/UserCouponId'
    resultRef:
      $ref: '#/ExternalRef'
    publicReasonCode:
      type: string
      maxLength: 80

TimelineData:
  type: object
  required: [items]
  additionalProperties: false
  properties:
    items:
      type: array
      items:
        $ref: '#/TimelineEvent'
    nextCursor:
      type: string
      maxLength: 512

TimelineResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/TimelineData'
    meta:
      $ref: '#/ResponseMeta'

CreateCompensationIssueRequest:
  type: object
  required: [campaignId, userId, sourceRef, reasonCode]
  additionalProperties: false
  properties:
    campaignId:
      $ref: '#/CampaignId'
    userId:
      $ref: '#/UserId'
    sourceRef:
      $ref: '#/ExternalRef'
    reasonCode:
      type: string
      minLength: 1
      maxLength: 80

SignalStatus:
  type: object
  required: [status, asOf]
  additionalProperties: false
  properties:
    status:
      type: string
      enum: [normal, degraded, critical, unavailable]
    asOf:
      type: string
      format: date-time
    lagSeconds:
      type: integer
      format: int64
      minimum: 0

IncidentStatusData:
  type: object
  required: [issuance, redemption, recovery, postgres, redis, mq, workers]
  additionalProperties: false
  properties:
    issuance:
      $ref: '#/SignalStatus'
    redemption:
      $ref: '#/SignalStatus'
    recovery:
      $ref: '#/SignalStatus'
    postgres:
      $ref: '#/SignalStatus'
    redis:
      $ref: '#/SignalStatus'
    mq:
      $ref: '#/SignalStatus'
    workers:
      $ref: '#/SignalStatus'

IncidentStatusResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/IncidentStatusData'
    meta:
      $ref: '#/ResponseMeta'

CostAttributionItem:
  type: object
  required: [attributionId, orderRef, redemptionId, campaignId, kind, discount, shares, occurredAt]
  additionalProperties: false
  properties:
    attributionId:
      type: string
      maxLength: 128
    orderRef:
      $ref: '#/ExternalRef'
    redemptionId:
      $ref: '#/RedemptionId'
    campaignId:
      $ref: '#/CampaignId'
    kind:
      type: string
      enum: [confirmed, reclaimed_adjustment]
    discount:
      $ref: '#/Money'
    shares:
      type: array
      minItems: 1
      items:
        $ref: '#/CostShare'
    occurredAt:
      type: string
      format: date-time

CostAttributionListData:
  type: object
  required: [items]
  additionalProperties: false
  properties:
    items:
      type: array
      items:
        $ref: '#/CostAttributionItem'
    nextCursor:
      type: string
      maxLength: 512

CostAttributionListResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/CostAttributionListData'
    meta:
      $ref: '#/ResponseMeta'
