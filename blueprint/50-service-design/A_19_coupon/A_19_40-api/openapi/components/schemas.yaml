      $ref: '#/OpaqueRef'
    attemptId:
      $ref: '#/AttemptId'
    attemptCount:
      type: integer
      minimum: 0
    nextAttemptAt:
      type: string
      format: date-time
    resultKind:
      type: string
      enum: [transitioned, already_applied, failed]
    resultRef:
      $ref: '#/ExternalRef'
    failureCode:
      type: string
      maxLength: 80
    updatedAt:
      type: string
      format: date-time

RecoveryListData:
  type: object
  required: [items]
  additionalProperties: false
  properties:
    items:
      type: array
      items:
        $ref: '#/RecoveryItem'
    nextCursor:
      type: string
      maxLength: 512

RecoveryListResponse:
  type: object
  required: [data, meta]
  additionalProperties: false
  properties:
    data:
      $ref: '#/RecoveryListData'
