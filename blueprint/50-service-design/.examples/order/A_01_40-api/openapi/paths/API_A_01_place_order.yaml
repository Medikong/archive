post:
  tags:
    - Orders
  summary: 주문 생성
  description: 구매자가 확인한 장바구니·배송지·쿠폰을 검증하고 서버 계산 금액으로 주문 스냅샷을 생성한다.
  operationId: placeOrder
  x-api-id: API.A.01
  x-use-case: UC.A.01-03
  x-service-design: SD.A.0140
  x-sequences:
    - SCN.A.01
  x-design-doc: ../../API_A_01_place_order.md
  security:
    - SessionCookie: []
      CsrfToken: []
      WebOrigin: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas.yaml#/PlaceOrderRequest
        example:
          cartId: 7d4a8f2c-5e14-46be-9b9b-987f5d69e001
          shippingAddressId: b08f06f5-2b4f-4c16-8a29-66d682d28a11
          couponId: c1f2d3e4-1111-4222-8333-444455556666
          expectedTotal:
            amount: 42000
            currency: KRW
  responses:
    '201':
      description: 주문과 금액 스냅샷을 생성했다. 같은 멱등 요청은 최초 주문 결과를 재사용한다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Location:
          $ref: ../components/headers.yaml#/Location
        Idempotency-Replayed:
          $ref: ../components/headers.yaml#/IdempotencyReplayed
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/PlaceOrderResponse
          example:
            data:
              orderId: 0fd7ec65-bb7e-4c58-a92a-9b7b8a31e001
              orderNumber: ORD-20260710-0001
              status: created
              total:
                amount: 42000
                currency: KRW
              createdAt: '2026-07-10T08:00:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/RequestForbidden
    '409':
      $ref: ../components/responses.yaml#/OrderConflict
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/DependencyUnavailable
