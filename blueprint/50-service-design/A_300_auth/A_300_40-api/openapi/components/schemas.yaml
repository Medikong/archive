RegistrationId:
  type: string
  minLength: 1
  description: 회원가입 처리의 opaque 식별자다. 구체적인 길이와 문자 집합은 아직 확정하지 않았다.
  example: reg_01JXYZ1234567890ABCDEFGHJK

ChallengeId:
  type: string
  minLength: 1
  description: 인증 Challenge의 opaque 식별자다. UUID 또는 prefix 식별자 여부는 아직 확정하지 않았다.
  example: vch_01JXYZ1234567890ABCDEFGHJK

AuthenticationIntentId:
  type: string
  minLength: 1
  maxLength: 128
  description: 로그인 전 행동과 복귀 위치를 보존하는 opaque Intent 식별자다.
  example: aint_01JXYZ1234567890ABCDEFGHJK

PasswordResetId:
  type: string
  minLength: 1
  maxLength: 128
  description: 실제 계정 여부를 노출하지 않는 opaque 비밀번호 재설정 식별자다.
  example: prst_01JXYZ1234567890ABCDEFGHJK

LinkIntentId:
  type: string
  minLength: 1
  maxLength: 128
  description: 새 인증 수단 연결을 위해 requested 상태로 만든 IdentityLink 식별자다.
  example: ilnk_01JXYZ1234567890ABCDEFGHJK

ReplacementId:
  type: string
  minLength: 1
  maxLength: 128
  description: 휴대폰 Identity 교체를 위해 requested 상태로 만든 IdentityLink 식별자다.
  example: ilnk_01JXYZ1234567890ABCDEFGHJK

UserId:
  type: string
  minLength: 1
  maxLength: 128
  description: Context 사용자가 발급한 내부 공유 사용자 식별자다.
  example: usr_01JXYZ1234567890ABCDEFGHJK

SessionId:
  type: string
  minLength: 1
  maxLength: 128
  description: 서버 Session의 opaque 식별자다.
  example: ses_01JXYZ1234567890ABCDEFGHJK

PolicyName:
  type: string
  enum:
    - login-lock
    - session-ttl
    - refresh-rotation
    - verification
    - session-revocation
  description: 변경 가능한 인증 정책 영역 이름이다.

PhoneNumber:
  type: object
  required:
    - countryCode
    - nationalNumber
  additionalProperties: false
  properties:
    countryCode:
      type: string
      pattern: '^\+[1-9][0-9]{0,2}$'
      example: '+82'
    nationalNumber:
      type: string
      pattern: '^[0-9]{4,14}$'
      description: 서버가 E.164로 정규화하기 전 국가번호 제외 숫자 문자열이다.
      example: '01012345678'

VerificationCode:
  type: string
  pattern: '^[0-9]{6}$'
  minLength: 6
  maxLength: 6
  description: MVP 이메일·SMS 소유 확인에 공통으로 사용하는 6자리 숫자 인증번호다.
  x-sensitive: true
  example: '123456'

CodeProof:
  type: object
  required:
    - type
    - value
  additionalProperties: false
  properties:
    type:
      type: string
      enum:
        - code
    value:
      $ref: '#/VerificationCode'

EmptyRequest:
  type: object
  description: 별도 업무 입력값이 없는 명령에서 사용하는 정확히 빈 JSON 객체다.
  maxProperties: 0
  additionalProperties: false
  example: {}

ResponseMeta:
  type: object
  required:
    - requestId
  additionalProperties: false
  properties:
    requestId:
      type: string
      format: uuid
      description: 응답 헤더 X-Request-Id와 같은 요청 식별자다.
      example: 30d9fa85-0a18-4263-98b6-231dca5a6fb8

RegistrationAcceptedData:
  type: object
  required:
    - registrationId
    - status
    - retryable
    - statusPath
  additionalProperties: false
  properties:
    registrationId:
      $ref: '#/RegistrationId'
    status:
      type: string
      enum:
        - verified
      description: 두 필수 Challenge를 완료해 프론트엔드가 User 생성을 시작할 수 있는 상태다.
    retryable:
      type: boolean
      enum:
        - true
      description: 프론트엔드가 User 생성과 Auth 완료 처리를 이어 갈 수 있음을 나타낸다.
    statusPath:
      type: string
      format: uri-reference
      pattern: ^/api/v1/auth/registrations/[^/?#]+$
      description: API.A.300-28 회원가입 상태 조회 상대 경로다.
      example: /api/v1/auth/registrations/reg_01JXYZ1234567890ABCDEFGHJK

RegistrationAcceptedResponse:
  type: object
  required:
    - data
    - meta
  additionalProperties: false
  properties:
    data:
      $ref: '#/RegistrationAcceptedData'
    meta:
      $ref: '#/ResponseMeta'

NextAction:
  type: object
  description: AuthenticationIntent가 없으면 intentId를 생략하고 path에는 서버 정책의 안전한 기본 경로를 반환한다.
  required:
    - path
  additionalProperties: false
  properties:
    path:
      type: string
      pattern: '^/($|[^/\\][^\\]*)$'
      description: 서버가 검증한 앱 내부 상대 경로다.
      example: /drops/drop_01JXYZ1234567890ABCDEFGHJK
    intentId:
      $ref: '#/AuthenticationIntentId'

SessionSummary:
  type: object
  required:
    - sessionId
    - expiresAt
  additionalProperties: false
  properties:
    sessionId:
      type: string
      description: 서버 Session의 opaque 식별자다.
      example: ses_01JXYZ1234567890ABCDEFGHJK
    expiresAt:
      type: string
      format: date-time
      description: Session의 절대 만료 시각이다.
      example: '2026-07-24T08:00:00Z'

MobileTokenPair:
  type: object
  required:
    - accessToken
    - accessTokenExpiresAt
    - refreshToken
    - refreshTokenExpiresAt
  additionalProperties: false
  properties:
    accessToken:
      type: string
      description: 짧은 수명의 DropMong access JWT다.
      x-sensitive: true
      example: <signed-jwt>
    accessTokenExpiresAt:
      type: string
      format: date-time
      example: '2026-07-10T08:15:00Z'
    refreshToken:
      type: string
      description: 서버 상태를 가진 회전형 opaque refresh token이다.
      x-sensitive: true
      example: <opaque-refresh-token>
    refreshTokenExpiresAt:
      type: string
      format: date-time
      example: '2026-07-24T08:00:00Z'

WebRegistrationCompletedData:
  type: object
  required:
    - registrationId
    - status
    - credentialDelivery
    - userId
    - sessionId
    - csrfToken
    - next
  additionalProperties: false
  properties:
    registrationId:
      $ref: '#/RegistrationId'
    status:
      type: string
      enum:
        - completed
    credentialDelivery:
      type: string
      enum:
        - web_session
      description: 웹 Session cookie와 CSRF token으로 credential을 전달했음을 나타낸다.
    userId:
      type: string
      description: Context 사용자가 발급하고 Auth에 연결한 사용자 식별자다.
      example: usr_01JXYZ1234567890ABCDEFGHJK
    sessionId:
      type: string
      description: Set-Cookie로 전달한 웹 Session의 식별자다.
      example: ses_01JXYZ1234567890ABCDEFGHJK
    csrfToken:
      type: string
      description: 새 Session credential에 묶여 이후 unsafe 요청에 사용하는 CSRF token이다.
      x-sensitive: true
      example: <session-bound-csrf-token>
    next:
      $ref: '#/NextAction'

MobileRegistrationCompletedData:
  type: object
  required:
    - registrationId
    - status
    - credentialDelivery
    - userId
    - session
    - tokens
    - next
  additionalProperties: false
  properties:
    registrationId:
      $ref: '#/RegistrationId'
    status:
      type: string
      enum:
        - completed
    credentialDelivery:
      type: string
      enum:
        - mobile_tokens
      description: 모바일 access JWT와 opaque refresh token으로 credential을 전달했음을 나타낸다.
    userId:
      type: string
      description: Context 사용자가 발급하고 Auth에 연결한 사용자 식별자다.
      example: usr_01JXYZ1234567890ABCDEFGHJK
    session:
      $ref: '#/SessionSummary'
    tokens:
      $ref: '#/MobileTokenPair'
    next:
      $ref: '#/NextAction'

RegistrationCompletedResponse:
  type: object
  required:
    - data
    - meta
  additionalProperties: false
  properties:
    data:
      oneOf:
        - $ref: '#/WebRegistrationCompletedData'
        - $ref: '#/MobileRegistrationCompletedData'
      discriminator:
        propertyName: credentialDelivery
        mapping:
          web_session: '#/WebRegistrationCompletedData'
          mobile_tokens: '#/MobileRegistrationCompletedData'
    meta:
      $ref: '#/ResponseMeta'

WebAuthenticationCompletedData:
  type: object
  required:
    - credentialDelivery
    - userId
    - sessionId
    - csrfToken
    - next
  additionalProperties: false
  properties:
    credentialDelivery:
      type: string
      enum:
        - web_session
    userId:
      $ref: '#/UserId'
    sessionId:
      $ref: '#/SessionId'
    csrfToken:
      type: string
      minLength: 1
      x-sensitive: true
      description: 새 웹 Session credential에 묶인 CSRF token이다.
      example: <session-bound-csrf-token>
    next:
      $ref: '#/NextAction'

MobileAuthenticationCompletedData:
  type: object
  required:
    - credentialDelivery
    - userId
    - session
    - tokens
    - next
  additionalProperties: false
  properties:
    credentialDelivery:
      type: string
      enum:
        - mobile_tokens
    userId:
      $ref: '#/UserId'
    session:
      $ref: '#/SessionSummary'
    tokens:
      $ref: '#/MobileTokenPair'
    next:
      $ref: '#/NextAction'

AuthenticationCompletedResponse:
  type: object
  required:
    - data
    - meta
  additionalProperties: false
  properties:
    data:
      oneOf:
        - $ref: '#/WebAuthenticationCompletedData'
        - $ref: '#/MobileAuthenticationCompletedData'
      discriminator:
        propertyName: credentialDelivery
        mapping:
          web_session: '#/WebAuthenticationCompletedData'
          mobile_tokens: '#/MobileAuthenticationCompletedData'
    meta:
      $ref: '#/ResponseMeta'

ReadyVirtualVerificationMessage:
  type: object
  required:
    - challengeId
    - channel
    - status
    - code
    - maskedDestination
    - expiresAt
  additionalProperties: false
  properties:
    challengeId:
      $ref: '#/ChallengeId'
    channel:
      type: string
      enum:
        - email_code
        - sms_code
    status:
      type: string
      enum:
        - ready
    code:
      $ref: '#/VerificationCode'
    maskedDestination:
      type: string
      minLength: 1
      description: 인증 화면에 표시할 마스킹된 이메일 주소 또는 휴대폰 번호다.
      example: b***@example.com
    expiresAt:
      type: string
      format: date-time
      example: '2026-07-10T08:08:00Z'

PendingVirtualVerificationMessage:
  type: object
  required:
    - challengeId
    - status
    - retryAfterSeconds
  additionalProperties: false
  properties:
    challengeId:
      $ref: '#/ChallengeId'
    status:
      type: string
      enum:
        - pending
    retryAfterSeconds:
      type: integer
      minimum: 1
      description: 다음 조회 전에 기다릴 최소 초다.
      example: 1

VirtualVerificationMessageResponse:
  type: object
  required:
    - data
    - meta
  additionalProperties: false
  properties:
    data:
      oneOf:
        - $ref: '#/ReadyVirtualVerificationMessage'
        - $ref: '#/PendingVirtualVerificationMessage'
      discriminator:
        propertyName: status
        mapping:
          ready: '#/ReadyVirtualVerificationMessage'
          pending: '#/PendingVirtualVerificationMessage'
    meta:
      $ref: '#/ResponseMeta'

FieldViolation:
  type: object
  required:
    - field
    - reason
  additionalProperties: false
  properties:
    field:
      type: string
      description: 오류가 발생한 공개 요청 필드 경로다.
      example: body
    reason:
      type: string
      description: 개인정보나 입력 원문을 포함하지 않는 안정적인 검증 실패 사유다.
      example: additional_property

ProblemDetails:
  type: object
  required:
    - type
    - title
    - status
    - code
    - detail
    - retryable
    - requestId
  additionalProperties: false
  properties:
    type:
      type: string
      format: uri
      description: 안정적인 문제 유형 URI다.
    title:
      type: string
      description: 개인정보나 내부 상태를 포함하지 않는 짧은 오류 제목이다.
    status:
      type: integer
      minimum: 400
      maximum: 599
    code:
      type: string
      pattern: ^AUTH_[A-Z0-9_]+$
      description: 클라이언트가 분기할 수 있는 인증 도메인 오류 코드다.
    detail:
      type: string
      description: 사용자에게 공개 가능한 일반화된 오류 설명이다.
    retryable:
      type: boolean
      description: 같은 요청을 다시 시도할 수 있는지 나타낸다.
    requestId:
      type: string
      format: uuid
      description: 지원 및 추적에 사용하는 요청 식별자다.
    violations:
      type: array
      description: 입력 검증 오류가 있을 때만 반환하는 공개 가능한 필드 오류 목록이다.
      items:
        $ref: '#/FieldViolation'
