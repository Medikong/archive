InputInvalid:
  description: 요청 형식 또는 schema가 유효하지 않다.
  headers:
    X-Request-Id:
      $ref: ./headers.yaml#/XRequestId
    Cache-Control:
      $ref: ./headers.yaml#/CacheControlNoStore
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: ./schemas.yaml#/ProblemDetails
          - type: object
            properties:
              status:
                type: integer
                enum:
                  - 400
              code:
                type: string
                enum:
                  - AUTH_INPUT_INVALID
      example:
        type: https://api.dropmong.example/problems/auth-input-invalid
        title: 요청 형식이 올바르지 않습니다.
        status: 400
        code: AUTH_INPUT_INVALID
        detail: 입력값을 확인한 뒤 다시 시도해주세요.
        retryable: false
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        violations:
          - field: body
            reason: additional_property

RegistrationNotFound:
  description: 인증 정보가 없거나 유효하지 않거나 현재 소유 binding으로 조회 가능한 Registration을 찾을 수 없다.
  headers:
    X-Request-Id:
      $ref: ./headers.yaml#/XRequestId
    Cache-Control:
      $ref: ./headers.yaml#/CacheControlNoStore
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: ./schemas.yaml#/ProblemDetails
          - type: object
            properties:
              status:
                type: integer
                enum:
                  - 404
              code:
                type: string
                enum:
                  - AUTH_REGISTRATION_NOT_FOUND
      example:
        type: https://api.dropmong.example/problems/auth-registration-not-found
        title: 회원가입 요청을 찾을 수 없습니다.
        status: 404
        code: AUTH_REGISTRATION_NOT_FOUND
        detail: 회원가입 요청과 현재 인증 컨텍스트를 확인해주세요.
        retryable: false
        requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8

CompleteRegistrationForbidden:
  description: 웹 CSRF 또는 User 생성 증거 검증에 실패했거나 사용자의 인증이 제한됐다.
  headers:
    X-Request-Id:
      $ref: ./headers.yaml#/XRequestId
    Cache-Control:
      $ref: ./headers.yaml#/CacheControlNoStore
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: ./schemas.yaml#/ProblemDetails
          - type: object
            properties:
              status:
                type: integer
                enum:
                  - 403
              code:
                type: string
                enum:
                  - AUTH_CSRF_INVALID
                  - AUTH_USER_CREATION_PROOF_INVALID
                  - AUTH_USER_RESTRICTED
      examples:
        csrfInvalid:
          summary: 웹 CSRF 또는 Origin 검증 실패
          value:
            type: https://api.dropmong.example/problems/auth-csrf-invalid
            title: 요청을 검증할 수 없습니다.
            status: 403
            code: AUTH_CSRF_INVALID
            detail: 인증 화면을 새로 연 뒤 다시 시도해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        userRestricted:
          summary: 연결된 사용자 인증 제한
          value:
            type: https://api.dropmong.example/problems/auth-user-restricted
            title: 로그인을 완료할 수 없습니다.
            status: 403
            code: AUTH_USER_RESTRICTED
            detail: 지원 절차를 확인해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8

CompleteRegistrationConflict:
  description: 필수 소유 확인이 끝나지 않았거나 완료 실행의 멱등 키가 충돌했다.
  headers:
    X-Request-Id:
      $ref: ./headers.yaml#/XRequestId
    Cache-Control:
      $ref: ./headers.yaml#/CacheControlNoStore
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: ./schemas.yaml#/ProblemDetails
          - type: object
            properties:
              status:
                type: integer
                enum:
                  - 409
              code:
                type: string
                enum:
                  - AUTH_IDEMPOTENCY_CONFLICT
                  - AUTH_VERIFICATION_REQUIRED
      examples:
        idempotencyConflict:
          summary: 다른 Idempotency-Key 또는 payload 충돌
          value:
            type: https://api.dropmong.example/problems/auth-idempotency-conflict
            title: 같은 요청을 이어 갈 수 없습니다.
            status: 409
            code: AUTH_IDEMPOTENCY_CONFLICT
            detail: 최초 요청에 사용한 Idempotency-Key로 다시 시도해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
        verificationRequired:
          summary: 필수 이메일 또는 휴대폰 소유 확인 미완료
          value:
            type: https://api.dropmong.example/problems/auth-verification-required
            title: 필수 인증이 완료되지 않았습니다.
            status: 409
            code: AUTH_VERIFICATION_REQUIRED
            detail: 이메일과 휴대폰 인증을 모두 완료한 뒤 다시 시도해주세요.
            retryable: false
            requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8

