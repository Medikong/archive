post:
  tags:
    - Registration
  summary: 회원가입 완료
  description: |
    프론트엔드가 생성한 User를 verified Registration에 연결하고 Session을 동기 발급한다.
    IdentityLink, Session과 Registration completed 상태는 하나의 Auth 트랜잭션에 저장한다.
  operationId: completeRegistration
  x-api-id: API.A.300-06
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-01
  x-design-doc: ../../API_A_300_06_complete_registration.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_USER_CREATION_PROOF_INVALID: 403
    AUTH_REGISTRATION_NOT_FOUND: 404
    AUTH_VERIFICATION_REQUIRED: 409
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_REGISTRATION_EXPIRED: 410
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/RegistrationId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - userId
            - userCreationProof
          additionalProperties: false
          properties:
            userId:
              type: string
              minLength: 1
            userCreationProof:
              type: string
              minLength: 1
              x-sensitive: true
        example:
          userId: usr_01JXYZ1234567890ABCDEFGHJK
          userCreationProof: <opaque-signed-proof>
  responses:
    '200':
      description: User 연결과 채널별 Session credential 발급을 완료했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/SetSessionAndClearAuthCookies
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            additionalProperties: false
            properties:
              data:
                type: object
                required:
                  - registrationId
                  - userId
                  - status
                  - credentialDelivery
                  - next
                additionalProperties: false
                properties:
                  registrationId:
                    $ref: ../components/schemas.yaml#/RegistrationId
                  userId:
                    type: string
                    minLength: 1
                  status:
                    type: string
                    enum:
                      - completed
                  credentialDelivery:
                    type: string
                    enum:
                      - web_session
                      - mobile_tokens
                  next:
                    type: object
                    required:
                      - path
                    additionalProperties: false
                    properties:
                      path:
                        type: string
                        pattern: ^/.*$
                      intentId:
                        $ref: ../components/schemas.yaml#/AuthenticationIntentId
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              registrationId: reg_01JXYZ1234567890ABCDEFGHJK
              userId: usr_01JXYZ1234567890ABCDEFGHJK
              status: completed
              credentialDelivery: web_session
              next:
                path: /
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '403':
      $ref: ../components/responses.yaml#/CompleteRegistrationForbidden
    '404':
      $ref: ../components/responses.yaml#/NotFound
    '409':
      $ref: ../components/responses.yaml#/CompleteRegistrationConflict
    '410':
      $ref: ../components/responses.yaml#/CompleteRegistrationGone
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
