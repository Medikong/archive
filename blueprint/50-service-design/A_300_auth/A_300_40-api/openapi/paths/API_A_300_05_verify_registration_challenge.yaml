post:
  tags:
    - Registration
  summary: 가입 Challenge 검증
  description: 가입용 이메일 또는 휴대폰 6자리 code를 검증하고 Challenge와 Identity 상태를 원자적으로 갱신한다.
  operationId: verifyRegistrationChallenge
  x-api-id: API.A.300-05
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-01
  x-design-doc: ../../API_A_300_05_verify_registration_challenge.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CHALLENGE_FAILED: 400
    AUTH_CSRF_INVALID: 403
    AUTH_REGISTRATION_NOT_FOUND: 404
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_CHALLENGE_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/RegistrationId
    - $ref: ../components/parameters.yaml#/ChallengeId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - code
          additionalProperties: false
          properties:
            code:
              $ref: ../components/schemas.yaml#/VerificationCode
        example:
          code: '123456'
  responses:
    '200':
      description: Challenge를 검증하고 Registration의 확인 수단 상태를 갱신했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            additionalProperties: false
            properties:
              data:
                type: object
                required:
                  - challengeId
                  - status
                  - registration
                additionalProperties: false
                properties:
                  challengeId:
                    $ref: ../components/schemas.yaml#/ChallengeId
                  status:
                    type: string
                    enum:
                      - verified
                  registration:
                    type: object
                    required:
                      - status
                      - verifiedMethods
                      - requiredVerifications
                    additionalProperties: false
                    properties:
                      status:
                        type: string
                        enum:
                          - pending_verification
                      verifiedMethods:
                        type: array
                        minItems: 1
                        maxItems: 2
                        uniqueItems: true
                        items:
                          type: string
                          enum:
                            - email
                            - phone
                      requiredVerifications:
                        type: array
                        minItems: 2
                        maxItems: 2
                        uniqueItems: true
                        items:
                          type: string
                          enum:
                            - email
                            - phone
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              challengeId: vch_01JXYZ1234567890ABCDEFGHJK
              status: verified
              registration:
                status: pending_verification
                verifiedMethods:
                  - email
                requiredVerifications:
                  - email
                  - phone
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400ChallengeFailedOrInputInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '404':
      $ref: ../components/responses.yaml#/NotFound
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ChallengeExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
