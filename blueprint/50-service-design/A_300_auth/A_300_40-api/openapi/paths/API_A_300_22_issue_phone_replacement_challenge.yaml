post:
  tags:
    - PhoneReplacement
  summary: 휴대폰 번호 교체 Challenge 발급
  description: |
    요청자 소유의 requested Link에 저장된 새 휴대폰 번호로 SMS Challenge를
    발급한다. 같은 멱등 key의 재요청은 메시지를 다시 발송하지 않는다.
  operationId: issuePhoneReplacementChallenge
  x-api-id: API.A.300-22
  x-use-case: UC.A.300
  x-use-case-goals:
    - UC.A.300-15
  x-service-design: SD.A.30040
  x-command-ids:
    - CMD.A.300-17
  x-sequences:
    - SCN.A.300-03
  x-design-doc: ../../API_A_300_22_issue_phone_replacement_challenge.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_REAUTH_REQUIRED: 403
    AUTH_IDENTITY_LINK_NOT_FOUND: 404
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_IDENTITY_LINK_INTENT_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - AccessBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/ReplacementId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    description: 별도 입력값 없이 requested Link에 고정된 번호를 사용한다.
    content:
      application/json:
        schema:
          $ref: ../components/schemas.yaml#/EmptyRequest
        example: {}
  responses:
    '201':
      description: SMS Challenge와 비동기 전달 요청을 만들었다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - challengeId
                  - maskedDestination
                  - expiresAt
                  - resendAvailableAt
                properties:
                  challengeId:
                    $ref: ../components/schemas.yaml#/ChallengeId
                  maskedDestination:
                    type: string
                    minLength: 1
                    maxLength: 128
                  expiresAt:
                    type: string
                    format: date-time
                  resendAvailableAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              challengeId: vch_01JXYZ1234567890ABCDEFGHJK
              maskedDestination: 010-****-5432
              expiresAt: '2026-07-10T08:08:00Z'
              resendAvailableAt: '2026-07-10T08:01:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403ReauthRequired
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404IdentityLinkNotFound
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410IdentityLinkIntentExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
