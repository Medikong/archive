post:
  tags:
    - PasswordReset
  summary: 비밀번호 재설정 Challenge 발급
  description: |
    선택한 email 또는 phone 인증 수단의 비밀번호 재설정 Challenge를 발급한다.
    외부 `method=phone`은 서버 내부에서 SMS 전달 방식으로 변환한다.
    실제 대상과 decoy PasswordReset은 같은 형태의 Challenge reference와 응답을 사용하며,
    실재하는 연결 수단에 대해서만 delivery outbox를 저장한다.
  operationId: issuePasswordResetChallenge
  x-api-id: API.A.300-11
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.310-01
  x-design-doc: ../../API_A_300_11_issue_password_reset_challenge.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_PASSWORD_RESET_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/PasswordResetId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - method
          properties:
            method:
              type: string
              enum:
                - email
                - phone
              description: 소유 확인에 사용할 인증 수단 종류다. phone은 현재 SMS 전달 Adapter로 변환한다.
        examples:
          email:
            value:
              method: email
          phone:
            value:
              method: phone
  responses:
    '202':
      description: Challenge 발급 요청을 수락했다. 응답은 실제 전달 여부를 나타내지 않는다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - status
                  - challengeId
                  - expiresAt
                properties:
                  status:
                    type: string
                    enum:
                      - accepted
                  challengeId:
                    $ref: ../components/schemas.yaml#/ChallengeId
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              status: accepted
              challengeId: vch_01JXYZ1234567890ABCDEFGHJK
              expiresAt: '2026-07-10T08:08:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400InputInvalidOrPasswordResetInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
