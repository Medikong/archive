post:
  tags:
    - Registration
  summary: 가입 Challenge 발급
  description: 가입에 필요한 이메일 또는 휴대폰 code Challenge와 비동기 delivery outbox를 만든다.
  operationId: issueRegistrationChallenge
  x-api-id: API.A.300-04
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-01
  x-design-doc: ../../API_A_300_04_issue_registration_challenge.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_REGISTRATION_NOT_FOUND: 404
    AUTH_METHOD_UNAVAILABLE: 409
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_REGISTRATION_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/RegistrationId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - method
          additionalProperties: false
          properties:
            method:
              type: string
              enum:
                - email
                - phone
        example:
          method: email
  responses:
    '201':
      description: Challenge와 delivery 요청을 만들었다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            additionalProperties: false
            properties:
              data:
                type: object
                required:
                  - challengeId
                  - method
                  - maskedDestination
                  - expiresAt
                  - resendAvailableAt
                additionalProperties: false
                properties:
                  challengeId:
                    $ref: ../components/schemas.yaml#/ChallengeId
                  method:
                    type: string
                    enum:
                      - email
                      - phone
                  maskedDestination:
                    type: string
                    minLength: 1
                  expiresAt:
                    type: string
                    format: date-time
                  resendAvailableAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              challengeId: vch_01JXYZ1234567890ABCDEFGHJK
              method: email
              maskedDestination: b***@example.com
              expiresAt: '2026-07-10T08:08:00Z'
              resendAvailableAt: '2026-07-10T08:01:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '404':
      $ref: ../components/responses.yaml#/NotFound
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrMethodUnavailable
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410RegistrationExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
