post:
  tags:
    - IdentityManagement
  summary: 휴대폰 인증 수단 연동 시작
  description: |
    `link_identity` 목적 ReauthenticationProof를 소비하고 신규 대상이면 requested phone IdentityLink를 만든다.
    같은 사용자에게 이미 active 연결된 대상이면 새 Link를 만들지 않고 기존 Link를 멱등 성공으로 반환한다.
    이번 버전에서는 `method=phone`만 지원하며 이 단계에서 SMS를 발송하지 않는다.
  operationId: startMethodLink
  x-api-id: API.A.300-18
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-design-doc: ../../API_A_300_18_start_method_link.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_CSRF_INVALID: 403
    AUTH_REAUTH_REQUIRED: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_IDENTITY_LINK_CONFLICT: 409
    AUTH_REAUTHENTICATION_PROOF_INVALID: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebSessionCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - method
            - destination
            - reauthenticationProof
          properties:
            method:
              type: string
              enum:
                - phone
            destination:
              $ref: ../components/schemas.yaml#/PhoneNumber
            reauthenticationProof:
              type: string
              minLength: 1
              writeOnly: true
              x-sensitive: true
              description: "`link_identity` 목적의 단기 1회용 proof다."
        example:
          method: phone
          destination:
            countryCode: '+82'
            nationalNumber: '01098765432'
          reauthenticationProof: <short-lived-link-identity-proof>
  responses:
    '200':
      description: 같은 사용자의 기존 active phone IdentityLink를 멱등 성공으로 반환했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - identityLinkId
                  - status
                  - method
                properties:
                  identityLinkId:
                    $ref: ../components/schemas.yaml#/LinkIntentId
                  status:
                    type: string
                    enum:
                      - active
                  method:
                    type: string
                    enum:
                      - phone
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              identityLinkId: ilnk_01JXYZ1234567890ABCDEFGHJK
              status: active
              method: phone
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '201':
      description: requested phone IdentityLink를 만들었다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - linkIntentId
                  - status
                  - method
                  - expiresAt
                properties:
                  linkIntentId:
                    $ref: ../components/schemas.yaml#/LinkIntentId
                  status:
                    type: string
                    enum:
                      - requested
                  method:
                    type: string
                    enum:
                      - phone
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              linkIntentId: ilnk_01JXYZ1234567890ABCDEFGHJK
              status: requested
              method: phone
              expiresAt: '2026-07-10T08:10:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalidOrReauthRequired
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrIdentityLinkConflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ReauthenticationProofInvalid
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
