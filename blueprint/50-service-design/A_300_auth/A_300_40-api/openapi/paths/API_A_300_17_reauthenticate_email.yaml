post:
  tags:
    - Reauthentication
  summary: 이메일 재인증
  description: |
    현재 비밀번호를 검증해 목적 한정 ReauthenticationProof를 발급한다.
    성공 시 Session을 이메일 인증 근거로 재바인딩하고 access JWT와 refresh credential을 회전한다.
  operationId: reauthenticateEmail
  x-api-id: API.A.300-17
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-03
  x-design-doc: ../../API_A_300_17_reauthenticate_email.md
  x-credential-delivery-recovery:
    state: rotated_pending_delivery
    requiredBindings:
      - session
      - operation
      - idempotencyKey
      - requestFingerprint
    previousCredentialHash: recovery_only
    replayPayload: encrypted_short_ttl
    generalAuthentication: forbidden
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SIGNIN_FAILED: 401
    AUTH_SESSION_REQUIRED: 401
    AUTH_USER_RESTRICTED: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_SESSION_DELIVERY_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - AccessBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - purpose
            - password
          properties:
            purpose:
              type: string
              enum:
                - replace_phone
                - link_identity
                - seller_order_export
                - seller_member_manage
                - seller_account_update
                - seller_partnership_respond
            password:
              type: string
              format: password
              minLength: 1
              maxLength: 1024
              writeOnly: true
              x-sensitive: true
        example:
          purpose: replace_phone
          password: <current-password>
  responses:
    '200':
      description: 재인증 proof와 회전된 채널별 Session credential을 발급했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/SetRefreshCookie
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - reauthenticationProof
                      - purpose
                      - expiresAt
                      - credentialDelivery
                      - session
                      - access
                    properties:
                      reauthenticationProof:
                        type: string
                        minLength: 1
                        x-sensitive: true
                      purpose:
                        type: string
                        enum:
                          - replace_phone
                          - link_identity
                          - seller_order_export
                          - seller_member_manage
                          - seller_account_update
                          - seller_partnership_respond
                      expiresAt:
                        type: string
                        format: date-time
                      credentialDelivery:
                        type: string
                        enum:
                          - web_jwt_refresh_cookie
                      session:
                        $ref: ../components/schemas.yaml#/SessionSummary
                      access:
                        $ref: ../components/schemas.yaml#/WebAccessToken
                  - type: object
                    additionalProperties: false
                    required:
                      - reauthenticationProof
                      - purpose
                      - expiresAt
                      - credentialDelivery
                      - session
                      - tokens
                    properties:
                      reauthenticationProof:
                        type: string
                        minLength: 1
                        x-sensitive: true
                      purpose:
                        type: string
                        enum:
                          - replace_phone
                          - link_identity
                          - seller_order_export
                          - seller_member_manage
                          - seller_account_update
                          - seller_partnership_respond
                      expiresAt:
                        type: string
                        format: date-time
                      credentialDelivery:
                        type: string
                        enum:
                          - mobile_tokens
                      session:
                        $ref: ../components/schemas.yaml#/SessionSummary
                      tokens:
                        $ref: ../components/schemas.yaml#/MobileTokenPair
                discriminator:
                  propertyName: credentialDelivery
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          examples:
            web:
              value:
                data:
                  reauthenticationProof: <short-lived-purpose-bound-proof>
                  purpose: replace_phone
                  expiresAt: '2026-07-10T08:05:00Z'
                  credentialDelivery: web_jwt_refresh_cookie
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-07-24T08:00:00Z'
                  access:
                    accessToken: <short-lived-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            mobile:
              value:
                data:
                  reauthenticationProof: <short-lived-purpose-bound-proof>
                  purpose: link_identity
                  expiresAt: '2026-07-10T08:05:00Z'
                  credentialDelivery: mobile_tokens
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-07-24T08:00:00Z'
                  tokens:
                    accessToken: <short-lived-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                    refreshToken: <rotated-opaque-token>
                    refreshTokenExpiresAt: '2026-07-24T08:00:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthProblem401SessionRequiredOrSigninFailed
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403UserRestricted
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410SessionDeliveryExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
