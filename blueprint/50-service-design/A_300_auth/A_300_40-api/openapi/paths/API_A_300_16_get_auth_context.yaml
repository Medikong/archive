get:
  tags:
    - Session
  summary: 현재 인증 컨텍스트 조회
  description: Istio가 검증한 Bearer access JWT와 active Session을 기준으로 현재 인증 컨텍스트를 반환한다.
  operationId: getAuthContext
  x-api-id: API.A.300-16
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-05
  x-design-doc: ../../API_A_300_16_get_auth_context.md
  x-protected-route: true
  x-error-codes:
    AUTH_SESSION_REQUIRED: 401
    AUTH_SESSION_REVOKED: 401
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - AccessBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
  responses:
    '200':
      description: 인증된 사용자와 Session의 안전한 요약을 반환한다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Vary:
          $ref: ../components/headers.yaml#/VaryAuthorization
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - authenticated
                  - userId
                  - session
                  - linkedMethodTypes
                properties:
                  authenticated:
                    type: boolean
                    enum:
                      - true
                  userId:
                    $ref: ../components/schemas.yaml#/UserId
                  session:
                    type: object
                    additionalProperties: false
                    required:
                      - sessionId
                      - channel
                      - authenticationMethod
                      - authenticatedAt
                      - expiresAt
                    properties:
                      sessionId:
                        $ref: ../components/schemas.yaml#/SessionId
                      channel:
                        type: string
                        enum:
                          - web
                          - ios
                          - android
                      authenticationMethod:
                        type: string
                        minLength: 1
                      authenticatedAt:
                        type: string
                        format: date-time
                      expiresAt:
                        type: string
                        format: date-time
                  linkedMethodTypes:
                    type: array
                    uniqueItems: true
                    items:
                      type: string
                      enum:
                        - email
                        - phone
                        - apple
                        - google
                        - passkey
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              authenticated: true
              userId: usr_01JXYZ1234567890ABCDEFGHJK
              session:
                sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                channel: web
                authenticationMethod: email_password
                authenticatedAt: '2026-07-10T08:00:00Z'
                expiresAt: '2026-08-09T08:00:00Z'
              linkedMethodTypes:
                - email
                - phone
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '401':
      $ref: ../components/responses.yaml#/AuthProblem401SessionRequiredOrRevoked
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
