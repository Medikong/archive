get:
  tags:
    - OperatorAuth
  summary: 운영자 인증 상태 조회
  description: |
    권한 있는 운영자가 CS 처리를 위해 사용자의 인증 상태, Identity별 잠금과
    Link 상태, 활성 Session 수를 조회한다. Identity 원문은 항상 마스킹한다.
  operationId: getOperatorAuthUser
  x-api-id: API.A.300-24
  x-use-case: UC.A.300
  x-use-case-goals:
    - UC.A.300-13
  x-service-design: SD.A.30040
  x-query-ids:
    - QRY.A.300-04
  x-design-doc: ../../API_A_300_24_get_operator_auth_user.md
  x-required-permissions:
    - auth.case.read
  x-required-assurance: strong
  x-require-current-access-grant: true
  x-audit-required: true
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_FORBIDDEN: 403
    AUTH_OPERATOR_TARGET_NOT_FOUND: 404
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebSessionCookie: []
  parameters:
    - $ref: ../components/parameters.yaml#/UserId
    - $ref: ../components/parameters.yaml#/XAuditReasonCode
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
  responses:
    '200':
      description: 마스킹된 사용자 인증 상태를 반환한다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - userId
                  - status
                  - userAuthStateVersion
                  - identities
                  - activeSessionCount
                properties:
                  userId:
                    $ref: ../components/schemas.yaml#/UserId
                  status:
                    type: string
                    enum:
                      - active
                      - restricted
                      - deactivated
                  userAuthStateVersion:
                    type: integer
                    format: int64
                    minimum: 0
                  identities:
                    type: array
                    maxItems: 20
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - identityId
                        - identityLinkId
                        - type
                        - maskedValue
                        - verificationStatus
                        - linkStatus
                        - rowVersion
                        - lock
                      properties:
                        identityId:
                          type: string
                          minLength: 1
                          maxLength: 128
                        identityLinkId:
                          type: string
                          minLength: 1
                          maxLength: 128
                        type:
                          type: string
                          enum:
                            - email
                            - phone
                            - provider_subject
                            - passkey
                        maskedValue:
                          type: string
                          minLength: 1
                          maxLength: 256
                        verificationStatus:
                          type: string
                          enum:
                            - pending
                            - verified
                            - expired
                            - failed
                        linkStatus:
                          type: string
                          enum:
                            - requested
                            - active
                            - replaced
                            - revoked
                            - manual_review
                        rowVersion:
                          type: integer
                          format: int64
                          minimum: 0
                        lock:
                          type: object
                          additionalProperties: false
                          required:
                            - locked
                          properties:
                            locked:
                              type: boolean
                            unlockAvailableAt:
                              type: string
                              format: date-time
                  activeSessionCount:
                    type: integer
                    minimum: 0
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              userId: usr_01JXYZ1234567890ABCDEFGHJK
              status: active
              userAuthStateVersion: 12
              identities:
                - identityId: idn_01JXYZ1234567890ABCDEFGHJK
                  identityLinkId: ilnk_01JXYZ1234567890ABCDEFGHJK
                  type: email
                  maskedValue: b***@example.com
                  verificationStatus: verified
                  linkStatus: active
                  rowVersion: 4
                  lock:
                    locked: false
              activeSessionCount: 2
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/Forbidden
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404OperatorTargetNotFound
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
