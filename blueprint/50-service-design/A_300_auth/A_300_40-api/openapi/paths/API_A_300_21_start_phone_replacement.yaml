post:
  tags:
    - PhoneReplacement
  summary: 휴대폰 번호 교체 시작
  description: |
    이메일 재인증으로 발급한 `replace_phone` 목적 proof를 소비하고 새 휴대폰
    Identity와 requested IdentityLink를 만든다. Challenge 발급과 Link 전환은 후속
    Endpoint에서 수행한다.
  operationId: startPhoneReplacement
  x-api-id: API.A.300-21
  x-use-case: UC.A.300
  x-use-case-goals:
    - UC.A.300-15
  x-service-design: SD.A.30040
  x-command-ids:
    - CMD.A.300-12
  x-sequences:
    - SCN.A.300-03
  x-design-doc: ../../API_A_300_21_start_phone_replacement.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_REAUTH_REQUIRED: 403
    AUTH_USER_RESTRICTED: 403
    AUTH_IDENTITY_LINK_CONFLICT: 409
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_REAUTHENTICATION_PROOF_INVALID: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - AccessBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - newPhone
            - reauthenticationProof
          properties:
            newPhone:
              $ref: ../components/schemas.yaml#/PhoneNumber
            reauthenticationProof:
              type: string
              minLength: 32
              maxLength: 2048
              description: "`replace_phone` 목적에 바인딩된 단기 opaque proof다."
              x-sensitive: true
        example:
          newPhone:
            countryCode: '+82'
            nationalNumber: '01098765432'
          reauthenticationProof: <short-lived-purpose-bound-proof>
  responses:
    '201':
      description: 새 휴대폰 Identity와 requested Link를 만들었다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - replacementId
                  - status
                  - expiresAt
                properties:
                  replacementId:
                    $ref: ../components/schemas.yaml#/ReplacementId
                  status:
                    type: string
                    enum:
                      - requested
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              replacementId: ilnk_01JXYZ1234567890ABCDEFGHJK
              status: requested
              expiresAt: '2026-07-10T08:10:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403ReauthRequiredOrUserRestricted
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrIdentityLinkConflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ReauthenticationProofInvalid
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
