put:
  tags:
    - PasswordReset
  summary: 비밀번호 재설정 완료
  description: |
    검증된 reset 권한으로 비밀번호를 교체하고 해당 사용자의 모든 Session과 refresh family를 폐기한다.
    웹은 auth-flow cookie에 바인딩된 권한을 사용하고 모바일은 request body의 reset grant를 함께 검증한다.
    `credentialDelivery`는 request variant와 제출한 보안 credential의 채널을 일치시키는 discriminator다.
  operationId: completePasswordReset
  x-api-id: API.A.300-13
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.310-01
  x-design-doc: ../../API_A_300_13_change_password.md
  x-channel-body-binding:
    web:
      security: WebAuthFlowCookie AND WebCsrfToken AND WebOrigin
      credentialDelivery: web_auth_flow
      resetGrant: forbidden
    mobile:
      security: MobileAuthFlowToken
      credentialDelivery: mobile_reset_grant
      resetGrant: required
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_PASSWORD_RESET_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_PASSWORD_RESET_GRANT_EXPIRED: 410
    AUTH_PASSWORD_POLICY_NOT_MET: 422
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/PasswordResetId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - type: object
              additionalProperties: false
              required:
                - credentialDelivery
                - newPassword
                - confirmPassword
              properties:
                credentialDelivery:
                  type: string
                  enum:
                    - web_auth_flow
                  description: 웹 auth-flow cookie에 바인딩된 reset 권한을 사용한다.
                newPassword:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 1024
                  writeOnly: true
                  x-sensitive: true
                confirmPassword:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 1024
                  writeOnly: true
                  x-sensitive: true
                  description: newPassword와 같아야 한다.
            - type: object
              additionalProperties: false
              required:
                - credentialDelivery
                - resetGrant
                - newPassword
                - confirmPassword
              properties:
                credentialDelivery:
                  type: string
                  enum:
                    - mobile_reset_grant
                  description: 모바일 auth flow와 1회용 reset grant를 함께 사용한다.
                resetGrant:
                  type: string
                  minLength: 1
                  writeOnly: true
                  x-sensitive: true
                newPassword:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 1024
                  writeOnly: true
                  x-sensitive: true
                confirmPassword:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 1024
                  writeOnly: true
                  x-sensitive: true
                  description: newPassword와 같아야 한다.
          discriminator:
            propertyName: credentialDelivery
        examples:
          web:
            value:
              credentialDelivery: web_auth_flow
              newPassword: <new-password>
              confirmPassword: <new-password>
          mobile:
            value:
              credentialDelivery: mobile_reset_grant
              resetGrant: <mobile-only-one-time-reset-grant>
              newPassword: <new-password>
              confirmPassword: <new-password>
  responses:
    '204':
      description: 비밀번호 교체와 기존 Session 폐기를 완료했다. 응답 body는 없다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/ClearAuthFlowCookie
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400InputInvalidOrPasswordResetInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410PasswordResetGrantExpired
    '422':
      $ref: ../components/responses.yaml#/UnprocessableEntity
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
