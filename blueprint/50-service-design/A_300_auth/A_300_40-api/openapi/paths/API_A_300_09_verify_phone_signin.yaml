post:
  tags:
    - SignIn
  summary: 휴대폰 로그인 검증
  description: SMS code 검증 뒤 active IdentityLink의 user_id로 채널별 Session credential을 발급한다.
  operationId: verifyPhoneSignIn
  x-api-id: API.A.300-09
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-02
  x-design-doc: ../../API_A_300_09_verify_phone_signin.md
  x-state-binding:
    source: AuthenticationIntent
    read:
      - clientChannel
      - rememberMe
  x-credential-delivery-recovery:
    state: consumed_intent_pending_delivery
    requiredBindings:
      - authenticationIntent
      - session
      - operation
      - idempotencyKey
      - requestFingerprint
    ownerProofHash: recovery_only
    result: revalidate verified challenge result and rotate existing session credential
    encryptedReplayPayload: forbidden
    generalAuthentication: forbidden
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CHALLENGE_FAILED: 400
    AUTH_CSRF_INVALID: 403
    AUTH_USER_RESTRICTED: 403
    AUTH_PHONE_IDENTITY_NOT_LINKED: 409
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_CHALLENGE_EXPIRED: 410
    AUTH_SESSION_DELIVERY_EXPIRED: 410
    AUTH_ACCOUNT_LOCKED: 423
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/ChallengeId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - code
          additionalProperties: false
          properties:
            code:
              $ref: ../components/schemas.yaml#/VerificationCode
        example:
          code: '123456'
  responses:
    '200':
      description: 휴대폰 소유와 active Link를 확인하고 채널별 Session credential을 발급했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/SetRefreshAndClearAuthCookies
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/AuthenticationCompletedResponse
          examples:
            web:
              value:
                data:
                  credentialDelivery: web_jwt_refresh_cookie
                  userId: usr_01JXYZ1234567890ABCDEFGHJK
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-08-09T08:00:00Z'
                  access:
                    accessToken: <signed-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                  next:
                    path: /drops/drop_01JXYZ1234567890ABCDEFGHJK
                    intentId: aint_01JXYZ1234567890ABCDEFGHJK
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            mobile:
              value:
                data:
                  credentialDelivery: mobile_tokens
                  userId: usr_01JXYZ1234567890ABCDEFGHJK
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-08-09T08:00:00Z'
                  tokens:
                    accessToken: <signed-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                    refreshToken: <opaque-refresh-token>
                    refreshTokenExpiresAt: '2026-08-09T08:00:00Z'
                  next:
                    path: /drops/drop_01JXYZ1234567890ABCDEFGHJK
                    intentId: aint_01JXYZ1234567890ABCDEFGHJK
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400ChallengeFailedOrInputInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalidOrUserRestricted
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrPhoneIdentityNotLinked
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ChallengeExpiredOrSessionDeliveryExpired
    '423':
      $ref: ../components/responses.yaml#/Locked
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
