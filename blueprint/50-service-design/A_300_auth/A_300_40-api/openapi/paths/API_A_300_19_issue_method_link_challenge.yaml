post:
  tags:
    - IdentityManagement
  summary: 휴대폰 인증 수단 연동 Challenge 발급
  description: |
    현재 사용자가 소유한 requested phone IdentityLink에 SMS Challenge를 발급한다.
    이번 버전에서는 `channel=sms`만 지원하며 실제 발송은 Outbox Relay가 수행한다.
  operationId: issueMethodLinkChallenge
  x-api-id: API.A.300-19
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-design-doc: ../../API_A_300_19_issue_method_link_challenge.md
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_CSRF_INVALID: 403
    AUTH_REAUTH_REQUIRED: 403
    AUTH_IDENTITY_LINK_NOT_FOUND: 404
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_IDENTITY_LINK_INTENT_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebSessionCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/LinkIntentId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - channel
          properties:
            channel:
              type: string
              enum:
                - sms
        example:
          channel: sms
  responses:
    '201':
      description: requested Link에 SMS Challenge를 발급했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - challengeId
                  - maskedDestination
                  - expiresAt
                properties:
                  challengeId:
                    $ref: ../components/schemas.yaml#/ChallengeId
                  maskedDestination:
                    type: string
                    minLength: 1
                    description: 현재 사용자가 시작한 phone Link의 표시용 마스킹 값이다.
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              challengeId: vch_01JXYZ1234567890ABCDEFGHJK
              maskedDestination: 010-****-5432
              expiresAt: '2026-07-10T08:08:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalidOrReauthRequired
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404IdentityLinkNotFound
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410IdentityLinkIntentExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
