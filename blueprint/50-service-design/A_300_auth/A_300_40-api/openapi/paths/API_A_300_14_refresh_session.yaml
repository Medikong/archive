post:
  tags:
    - Session
  summary: Session 갱신
  description: |
    웹 refresh cookie 또는 모바일 X-Refresh-Token의 opaque credential을 검증하고
    같은 Session 안에서 refresh credential을 회전한 뒤 새 access JWT를 발급한다.
  operationId: refreshSession
  x-api-id: API.A.300-14
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.300-02
    - SCN.A.300-05
  x-design-doc: ../../API_A_300_14_refresh_session.md
  x-credential-variants:
    web: WebRefreshCookie AND WebCsrfToken AND WebOrigin
    mobile: MobileRefreshToken
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_SESSION_REVOKED: 401
    AUTH_USER_RESTRICTED: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_REFRESH_RETRY_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebRefreshCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileRefreshToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  responses:
    '200':
      description: refresh credential을 회전하고 새 access JWT를 발급했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/SetRefreshCookie
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - credentialDelivery
                      - session
                      - access
                    properties:
                      credentialDelivery:
                        type: string
                        enum:
                          - web_jwt_refresh_cookie
                      session:
                        $ref: ../components/schemas.yaml#/SessionSummary
                      access:
                        $ref: ../components/schemas.yaml#/WebAccessToken
                  - type: object
                    additionalProperties: false
                    required:
                      - credentialDelivery
                      - session
                      - tokens
                    properties:
                      credentialDelivery:
                        type: string
                        enum:
                          - mobile_tokens
                      session:
                        $ref: ../components/schemas.yaml#/SessionSummary
                      tokens:
                        $ref: ../components/schemas.yaml#/MobileTokenPair
                discriminator:
                  propertyName: credentialDelivery
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          examples:
            web:
              value:
                data:
                  credentialDelivery: web_jwt_refresh_cookie
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-08-09T08:00:00Z'
                  access:
                    accessToken: <signed-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            mobile:
              value:
                data:
                  credentialDelivery: mobile_tokens
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-08-09T08:00:00Z'
                  tokens:
                    accessToken: <signed-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                    refreshToken: <rotated-opaque-refresh-token>
                    refreshTokenExpiresAt: '2026-08-09T08:00:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthProblem401SessionRevoked
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403UserRestricted
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410RefreshRetryExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
