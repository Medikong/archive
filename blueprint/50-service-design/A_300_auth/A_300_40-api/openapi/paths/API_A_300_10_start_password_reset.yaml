post:
  tags:
    - PasswordReset
  summary: 비밀번호 재설정 시작
  description: 이메일 또는 휴대폰 식별자를 받아 계정 존재 여부를 숨긴 실제·decoy PasswordReset을 접수한다.
  operationId: startPasswordReset
  x-api-id: API.A.300-10
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.310-01
  x-design-doc: ../../API_A_300_10_start_password_reset.md
  x-parent-lifetime-extension: PasswordReset, AuthenticationIntent, and its active owner proof share the child expiry capped by the maximum auth-flow lifetime.
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_INTENT_NOT_FOUND: 404
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_INTENT_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - type: object
              required:
                - identifierType
                - email
              additionalProperties: false
              properties:
                identifierType:
                  type: string
                  enum:
                    - email
                email:
                  type: string
                  format: email
                  minLength: 3
                  maxLength: 254
            - type: object
              required:
                - identifierType
                - phone
              additionalProperties: false
              properties:
                identifierType:
                  type: string
                  enum:
                    - phone
                phone:
                  $ref: ../components/schemas.yaml#/PhoneNumber
          discriminator:
            propertyName: identifierType
        examples:
          email:
            value:
              identifierType: email
              email: buyer@example.com
          phone:
            value:
              identifierType: phone
              phone:
                countryCode: '+82'
                nationalNumber: '01012345678'
  responses:
    '202':
      description: 계정 존재 여부와 무관하게 PasswordReset 요청을 접수했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - meta
            additionalProperties: false
            properties:
              data:
                type: object
                required:
                  - passwordResetId
                  - status
                  - methodOptions
                  - expiresAt
                additionalProperties: false
                properties:
                  passwordResetId:
                    $ref: ../components/schemas.yaml#/PasswordResetId
                  status:
                    type: string
                    enum:
                      - accepted
                  methodOptions:
                    type: array
                    minItems: 1
                    maxItems: 2
                    uniqueItems: true
                    description: 실제 연결 여부가 아니라 현재 정책에서 지원하는 수단이다.
                    items:
                      type: string
                      enum:
                        - email
                        - phone
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              passwordResetId: prst_01JXYZ1234567890ABCDEFGHJK
              status: accepted
              methodOptions:
                - email
                - phone
              expiresAt: '2026-07-10T08:15:00Z'
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/InputInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404IntentNotFound
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/Gone
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
