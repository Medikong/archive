post:
  tags:
    - PasswordReset
  summary: 비밀번호 재설정 Challenge 검증
  description: |
    PasswordReset에 바인딩된 이메일 또는 SMS code proof를 검증한다.
    웹은 auth-flow cookie에 reset 권한을 바인딩하고 모바일은 1회용 reset grant를 반환한다.
  operationId: verifyPasswordResetChallenge
  x-api-id: API.A.300-12
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-sequences:
    - SCN.A.310-01
  x-design-doc: ../../API_A_300_12_verify_password_reset_challenge.md
  x-idempotency-retry-policy:
    same-key: 전송 결과가 불확실한 동일 request body의 재전송에만 사용한다.
    new-key: 검증 실패 뒤 새로 입력하거나 수정한 code를 제출할 때 사용한다.
  x-idempotent-grant-reissue:
    scope: same passwordReset, challenge, idempotency key, and request fingerprint
    mobile: atomically replace the reset grant hash and return a new grant
    previousGrant: invalidated
    encryptedReplayPayload: forbidden
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CHALLENGE_FAILED: 400
    AUTH_PASSWORD_RESET_INVALID: 400
    AUTH_CSRF_INVALID: 403
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_CHALLENGE_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebAuthFlowCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileAuthFlowToken: []
  parameters:
    - $ref: ../components/parameters.yaml#/PasswordResetId
    - $ref: ../components/parameters.yaml#/ChallengeId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - code
          properties:
            code:
              $ref: ../components/schemas.yaml#/VerificationCode
        example:
          code: '123456'
  responses:
    '200':
      description: Challenge 검증을 완료하고 채널별 reset 권한을 발급했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - passwordResetId
                      - status
                      - credentialDelivery
                      - expiresAt
                    properties:
                      passwordResetId:
                        $ref: ../components/schemas.yaml#/PasswordResetId
                      status:
                        type: string
                        enum:
                          - verified
                      credentialDelivery:
                        type: string
                        enum:
                          - web_auth_flow
                      expiresAt:
                        type: string
                        format: date-time
                  - type: object
                    additionalProperties: false
                    required:
                      - passwordResetId
                      - status
                      - credentialDelivery
                      - resetGrant
                      - expiresAt
                    properties:
                      passwordResetId:
                        $ref: ../components/schemas.yaml#/PasswordResetId
                      status:
                        type: string
                        enum:
                          - verified
                      credentialDelivery:
                        type: string
                        enum:
                          - mobile_reset_grant
                      resetGrant:
                        type: string
                        minLength: 1
                        x-sensitive: true
                        description: 모바일 비밀번호 변경에 한 번만 사용할 수 있는 단기 opaque grant다.
                      expiresAt:
                        type: string
                        format: date-time
                discriminator:
                  propertyName: credentialDelivery
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          examples:
            web:
              value:
                data:
                  passwordResetId: prst_01JXYZ1234567890ABCDEFGHJK
                  status: verified
                  credentialDelivery: web_auth_flow
                  expiresAt: '2026-07-10T08:10:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            mobile:
              value:
                data:
                  passwordResetId: prst_01JXYZ1234567890ABCDEFGHJK
                  status: verified
                  credentialDelivery: mobile_reset_grant
                  resetGrant: <mobile-only-one-time-reset-grant>
                  expiresAt: '2026-07-10T08:10:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400ChallengeFailedOrInputInvalidOrPasswordResetInvalid
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalid
    '409':
      $ref: ../components/responses.yaml#/Conflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ChallengeExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
