post:
  tags:
    - IdentityManagement
  summary: 휴대폰 인증 수단 연동 완료
  description: |
    requested phone IdentityLink에 바인딩된 SMS code proof를 검증하고 Link를 active로 전환한다.
    다른 사용자에게 연결된 Identity를 이전하거나 계정을 병합하지 않는다.
  operationId: completeMethodLink
  x-api-id: API.A.300-20
  x-use-case: UC.A.300
  x-service-design: SD.A.30040
  x-design-doc: ../../API_A_300_20_complete_method_link.md
  x-idempotency-retry-policy:
    same-key: 전송 결과가 불확실한 동일 request body의 재전송에만 사용한다.
    new-key: 검증 실패 뒤 새로 입력하거나 수정한 code를 제출할 때 사용한다.
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CHALLENGE_FAILED: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_REAUTH_REQUIRED: 403
    AUTH_IDENTITY_LINK_NOT_FOUND: 404
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_IDENTITY_LINK_CONFLICT: 409
    AUTH_CHALLENGE_EXPIRED: 410
    AUTH_IDENTITY_LINK_INTENT_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - AccessBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/LinkIntentId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/XDeviceInstallationId
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - challengeId
            - proof
          properties:
            challengeId:
              $ref: ../components/schemas.yaml#/ChallengeId
            proof:
              $ref: ../components/schemas.yaml#/CodeProof
        example:
          challengeId: vch_01JXYZ1234567890ABCDEFGHJK
          proof:
            type: code
            value: '123456'
  responses:
    '200':
      description: phone IdentityLink를 현재 사용자에게 active 상태로 연결했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - identityLinkId
                  - status
                  - method
                properties:
                  identityLinkId:
                    $ref: ../components/schemas.yaml#/LinkIntentId
                  status:
                    type: string
                    enum:
                      - active
                  method:
                    type: string
                    enum:
                      - phone
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          example:
            data:
              identityLinkId: ilnk_01JXYZ1234567890ABCDEFGHJK
              status: active
              method: phone
            meta:
              requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400ChallengeFailedOrInputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403ReauthRequired
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404IdentityLinkNotFound
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrIdentityLinkConflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ChallengeExpiredOrIdentityLinkIntentExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
