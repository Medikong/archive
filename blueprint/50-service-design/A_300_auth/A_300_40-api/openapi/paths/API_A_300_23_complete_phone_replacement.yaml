post:
  tags:
    - PhoneReplacement
  summary: 휴대폰 번호 교체 완료
  description: |
    새 번호 Challenge를 확인하고 기존 휴대폰 Link를 replaced로 닫은 뒤 같은
    `user_id`에 새 Link를 활성화한다. 영향받는 Session을 폐기하고 현재 Session
    credential을 채널에 맞게 회전한다.
  operationId: completePhoneReplacement
  x-api-id: API.A.300-23
  x-use-case: UC.A.300
  x-use-case-goals:
    - UC.A.300-15
  x-service-design: SD.A.30040
  x-command-ids:
    - CMD.A.300-18
    - CMD.A.300-14
  x-sequences:
    - SCN.A.300-03
  x-design-doc: ../../API_A_300_23_complete_phone_replacement.md
  x-credential-delivery-recovery:
    state: rotated_pending_delivery
    requiredBindings:
      - session
      - operation
      - idempotencyKey
      - requestFingerprint
    previousCredentialHash: recovery_only
    replayPayload: encrypted_short_ttl
    generalAuthentication: forbidden
  x-error-codes:
    AUTH_INPUT_INVALID: 400
    AUTH_CHALLENGE_FAILED: 400
    AUTH_SESSION_REQUIRED: 401
    AUTH_CSRF_INVALID: 403
    AUTH_REAUTH_REQUIRED: 403
    AUTH_USER_RESTRICTED: 403
    AUTH_IDENTITY_LINK_NOT_FOUND: 404
    AUTH_IDENTITY_LINK_CONFLICT: 409
    AUTH_IDEMPOTENCY_CONFLICT: 409
    AUTH_CHALLENGE_EXPIRED: 410
    AUTH_IDENTITY_LINK_INTENT_EXPIRED: 410
    AUTH_SESSION_DELIVERY_EXPIRED: 410
    AUTH_RATE_LIMITED: 429
    AUTH_SERVICE_UNAVAILABLE: 503
  security:
    - WebSessionCookie: []
      WebCsrfToken: []
      WebOrigin: []
    - MobileBearerAuth: []
  parameters:
    - $ref: ../components/parameters.yaml#/ReplacementId
    - $ref: ../components/parameters.yaml#/XRequestId
    - $ref: ../components/parameters.yaml#/Traceparent
    - $ref: ../components/parameters.yaml#/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - challengeId
            - proof
          properties:
            challengeId:
              $ref: ../components/schemas.yaml#/ChallengeId
            proof:
              $ref: ../components/schemas.yaml#/CodeProof
        example:
          challengeId: vch_01JXYZ1234567890ABCDEFGHJK
          proof:
            type: code
            value: '123456'
  responses:
    '200':
      description: Link 교체와 현재 Session credential 회전을 완료했다.
      headers:
        X-Request-Id:
          $ref: ../components/headers.yaml#/XRequestId
        Cache-Control:
          $ref: ../components/headers.yaml#/CacheControlNoStore
        Set-Cookie:
          $ref: ../components/headers.yaml#/SetSessionCookie
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                oneOf:
                  - type: object
                    additionalProperties: false
                    required:
                      - replacementId
                      - status
                      - credentialDelivery
                      - sessionId
                      - csrfToken
                    properties:
                      replacementId:
                        $ref: ../components/schemas.yaml#/ReplacementId
                      status:
                        type: string
                        enum:
                          - active
                      credentialDelivery:
                        type: string
                        enum:
                          - web_session
                      sessionId:
                        type: string
                        minLength: 1
                        maxLength: 128
                      csrfToken:
                        type: string
                        minLength: 32
                        maxLength: 2048
                        x-sensitive: true
                  - type: object
                    additionalProperties: false
                    required:
                      - replacementId
                      - status
                      - credentialDelivery
                      - session
                      - tokens
                    properties:
                      replacementId:
                        $ref: ../components/schemas.yaml#/ReplacementId
                      status:
                        type: string
                        enum:
                          - active
                      credentialDelivery:
                        type: string
                        enum:
                          - mobile_tokens
                      session:
                        $ref: ../components/schemas.yaml#/SessionSummary
                      tokens:
                        $ref: ../components/schemas.yaml#/MobileTokenPair
                discriminator:
                  propertyName: credentialDelivery
              meta:
                $ref: ../components/schemas.yaml#/ResponseMeta
          examples:
            web:
              summary: 웹 Session credential 회전
              value:
                data:
                  replacementId: ilnk_01JXYZ1234567890ABCDEFGHJK
                  status: active
                  credentialDelivery: web_session
                  sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                  csrfToken: <session-bound-csrf-token-opaque-secret>
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
            mobile:
              summary: 모바일 token 회전
              value:
                data:
                  replacementId: ilnk_01JXYZ1234567890ABCDEFGHJK
                  status: active
                  credentialDelivery: mobile_tokens
                  session:
                    sessionId: ses_01JXYZ1234567890ABCDEFGHJK
                    expiresAt: '2026-07-24T08:00:00Z'
                  tokens:
                    accessToken: <signed-jwt>
                    accessTokenExpiresAt: '2026-07-10T08:15:00Z'
                    refreshToken: <opaque-refresh-token>
                    refreshTokenExpiresAt: '2026-07-24T08:00:00Z'
                meta:
                  requestId: 30d9fa85-0a18-4263-98b6-231dca5a6fb8
    '400':
      $ref: ../components/responses.yaml#/AuthProblem400ChallengeFailedOrInputInvalid
    '401':
      $ref: ../components/responses.yaml#/AuthenticationRequired
    '403':
      $ref: ../components/responses.yaml#/AuthProblem403CsrfInvalidOrReauthRequiredOrUserRestricted
    '404':
      $ref: ../components/responses.yaml#/AuthProblem404IdentityLinkNotFound
    '409':
      $ref: ../components/responses.yaml#/AuthProblem409IdempotencyConflictOrIdentityLinkConflict
    '410':
      $ref: ../components/responses.yaml#/AuthProblem410ChallengeExpiredOrIdentityLinkIntentExpiredOrSessionDeliveryExpired
    '429':
      $ref: ../components/responses.yaml#/RateLimited
    '503':
      $ref: ../components/responses.yaml#/AuthServiceUnavailable
