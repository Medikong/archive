openapi: 3.0.4
info:
  title: DropMong Context 인증 API
  version: 0.2.0
  description: |
    SD.A.30040의 운영 HTTP 계약 원장이다. 사용자 인증 API와 운영자 API를 포함하며
    개발 전용 가상 인증 메시지 API는 dev.openapi.yaml에서 별도로 관리한다.
servers:
  - url: https://api.dropmong.example
    description: 운영 Gateway 예시 주소
tags:
  - name: Bootstrap
    description: 로그인 전 인증 Intent와 지원 수단
  - name: Registration
    description: 회원가입 시작, 소유 확인과 동기 완료 상태
  - name: SignIn
    description: 이메일·휴대폰 로그인
  - name: PasswordReset
    description: 비밀번호 재설정 요청, 소유 확인과 비밀번호 교체
  - name: Session
    description: Session 갱신, 로그아웃과 현재 인증 컨텍스트
  - name: Reauthentication
    description: 고위험 변경을 위한 목적 한정 재인증
  - name: IdentityManagement
    description: 인증 수단 연동과 휴대폰 Identity 교체
  - name: PhoneReplacement
    description: 재인증 뒤 휴대폰 Identity를 교체하는 API
  - name: AuthenticationIntent
    description: 로그인 뒤 보존한 사용자 행동을 한 번 전달하는 API
  - name: OperatorAuth
    description: 권한과 강한 인증이 필요한 운영자 인증 상태·수동 처리 API
  - name: AuthPolicy
    description: 단일 version snapshot으로 관리하는 운영자 인증 정책 API
paths:
  /api/v1/auth/intents:
    $ref: ./paths/API_A_300_01_create_authentication_intent.yaml
  /api/v1/auth/methods:
    $ref: ./paths/API_A_300_02_get_authentication_methods.yaml
  /api/v1/auth/registrations:
    $ref: ./paths/API_A_300_03_start_email_registration.yaml
  /api/v1/auth/registrations/{registrationId}/challenges:
    $ref: ./paths/API_A_300_04_issue_registration_challenge.yaml
  /api/v1/auth/registrations/{registrationId}/challenges/{challengeId}/verify:
    $ref: ./paths/API_A_300_05_verify_registration_challenge.yaml
  /api/v1/auth/registrations/{registrationId}/complete:
    $ref: ./paths/API_A_300_06_complete_registration.yaml
  /api/v1/auth/signins/email:
    $ref: ./paths/API_A_300_07_sign_in_with_email.yaml
  /api/v1/auth/signins/phone/challenges:
    $ref: ./paths/API_A_300_08_issue_phone_signin_challenge.yaml
  /api/v1/auth/signins/phone/challenges/{challengeId}/verify:
    $ref: ./paths/API_A_300_09_verify_phone_signin.yaml
  /api/v1/auth/password-resets:
    $ref: ./paths/API_A_300_10_start_password_reset.yaml
  /api/v1/auth/password-resets/{passwordResetId}/challenges:
    $ref: ./paths/API_A_300_11_issue_password_reset_challenge.yaml
  /api/v1/auth/password-resets/{passwordResetId}/challenges/{challengeId}/verify:
    $ref: ./paths/API_A_300_12_verify_password_reset_challenge.yaml
  /api/v1/auth/password-resets/{passwordResetId}/password:
    $ref: ./paths/API_A_300_13_change_password.yaml
  /api/v1/auth/sessions/refresh:
    $ref: ./paths/API_A_300_14_refresh_session.yaml
  /api/v1/auth/sessions/logout:
    $ref: ./paths/API_A_300_15_logout_session.yaml
  /api/v1/auth/context:
    $ref: ./paths/API_A_300_16_get_auth_context.yaml
  /api/v1/auth/reauthentications/email:
    $ref: ./paths/API_A_300_17_reauthenticate_email.yaml
  /api/v1/auth/method-links:
    $ref: ./paths/API_A_300_18_start_method_link.yaml
  /api/v1/auth/method-links/{linkIntentId}/challenges:
    $ref: ./paths/API_A_300_19_issue_method_link_challenge.yaml
  /api/v1/auth/method-links/{linkIntentId}/complete:
    $ref: ./paths/API_A_300_20_complete_method_link.yaml
  /api/v1/auth/phone-replacements:
    $ref: ./paths/API_A_300_21_start_phone_replacement.yaml
  /api/v1/auth/phone-replacements/{replacementId}/challenges:
    $ref: ./paths/API_A_300_22_issue_phone_replacement_challenge.yaml
  /api/v1/auth/phone-replacements/{replacementId}/complete:
    $ref: ./paths/API_A_300_23_complete_phone_replacement.yaml
  /api/v1/operator/auth/users/{userId}:
    $ref: ./paths/API_A_300_24_get_operator_auth_user.yaml
  /api/v1/operator/auth/policies:
    $ref: ./paths/API_A_300_25_get_auth_policies.yaml
  /api/v1/operator/auth/policies/{policyName}:
    $ref: ./paths/API_A_300_26_update_auth_policy.yaml
  /api/v1/operator/auth/manual-actions:
    $ref: ./paths/API_A_300_27_apply_manual_auth_action.yaml
  /api/v1/auth/registrations/{registrationId}:
    $ref: ./paths/API_A_300_28_get_registration_status.yaml
  /api/v1/auth/intents/{intentId}/action-resume:
    $ref: ./paths/API_A_300_29_resume_authenticated_action.yaml
  /api/v1/operator/auth/users/{userId}/account-status:
    $ref: ./paths/API_A_300_31_apply_user_account_status.yaml
components:
  securitySchemes:
    WebAuthFlowCookie:
      $ref: ./components/security-schemes.yaml#/WebAuthFlowCookie
    WebCsrfToken:
      $ref: ./components/security-schemes.yaml#/WebCsrfToken
    WebOrigin:
      $ref: ./components/security-schemes.yaml#/WebOrigin
    WebSessionCookie:
      $ref: ./components/security-schemes.yaml#/WebSessionCookie
    MobileAuthFlowToken:
      $ref: ./components/security-schemes.yaml#/MobileAuthFlowToken
    RegistrationStatusToken:
      $ref: ./components/security-schemes.yaml#/RegistrationStatusToken
    MobileRefreshToken:
      $ref: ./components/security-schemes.yaml#/MobileRefreshToken
    MobileBearerAuth:
      $ref: ./components/security-schemes.yaml#/MobileBearerAuth
