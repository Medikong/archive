openapi: 3.0.4
info:
  title: Context 판매자 논리 API 배치 초안
  version: 0.1.0
  description: API.A.200 operation의 wire 검토용 초안이다. 단일 seller-service 또는 BFF를 전제한 배포 계약이 아니며, 소유 서비스와 Ingress-facing 인증·path를 확정한 뒤 각 서비스 OpenAPI로 옮겨야 한다.
  license:
    name: Proprietary
x-contract-status: allocation-pending
servers:
  - url: https://api.dropmong.example
    description: 검증용 예시 주소. 실제 Ingress route가 아니다.
tags:
  - name: SellerAccess
    description: seller membership과 현재 업무 권한 해석
  - name: SellerManagement
    description: 판매자 계정·스토어·팀·역할 관리
  - name: SellerProposal
    description: 판매자 상품·드롭 제안·검수·변경
  - name: SellerOperations
    description: 대시보드·드롭·주문·분석·정산 조회
  - name: SellerExport
    description: 주문 자료 요청·완료·만료
  - name: SellerIssue
    description: 판매자 운영 이슈·추가 정보·외부 결과
