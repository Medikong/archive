SellerId:
  name: sellerId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/SellerId

MembershipId:
  name: membershipId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/MembershipId

ProductId:
  name: productId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/ProductId

ProposalId:
  name: proposalId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/ProposalId

ExportId:
  name: exportId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/ExportId

IssueId:
  name: issueId
  in: path
  required: true
  schema:
    $ref: ./schemas.yaml#/IssueId

XRequestId:
  name: X-Request-Id
  in: header
  required: false
  schema:
    type: string
    format: uuid

Traceparent:
  name: traceparent
  in: header
  required: false
  schema:
    type: string
    maxLength: 128

AuthenticatedUserId:
  name: X-Authenticated-User-Id
  in: header
  required: true
  description: Auth가 확인하고 Ingress 신뢰 경계가 전달한 user_id다. 브라우저가 보낸 값을 신뢰하지 않으며 이메일·휴대폰은 허용하지 않는다.
  schema:
    type: string
    minLength: 1
    maxLength: 128

AuthenticatedSessionRef:
  name: X-Authenticated-Session-Ref
  in: header
  required: true
  description: 현재 Auth Session의 opaque 참조다. Seller 권한을 나타내지 않는다.
  schema:
    type: string
    minLength: 1
    maxLength: 160

IdempotencyKey:
  name: Idempotency-Key
  in: header
  required: true
  description: API ID, 인증 principal, seller ID에 묶는 고엔트로피 멱등 key다.
  schema:
    type: string
    minLength: 16
    maxLength: 128
    pattern: '^[A-Za-z0-9._:-]+$'

VersionPrecondition:
  name: If-Match
  in: header
  required: true
  description: 현재 resource ETag를 사용한다. client-generated ID 최초 생성은 별표를 사용한다.
  schema:
    type: string
    pattern: '^(\*|"[A-Za-z0-9._:-]+")$'

Cursor:
  name: cursor
  in: query
  required: false
  schema:
    type: string
    minLength: 1
    maxLength: 512

Limit:
  name: limit
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100

From:
  name: from
  in: query
  required: false
  schema:
    type: string
    format: date-time

To:
  name: to
  in: query
  required: false
  schema:
    type: string
    format: date-time
